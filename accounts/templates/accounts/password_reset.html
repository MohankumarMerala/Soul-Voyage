{% extends "base.html" %}
{% block content %}
<style>
    .auth-wrap {
        max-width: 480px;
        margin: 60px auto;
        padding: 0 20px;
    }

    .auth-card {
        background: rgba(8, 8, 20, 0.75);
        border: 1px solid rgba(201, 168, 76, 0.25);
        border-radius: 20px;
        padding: 44px 40px;
        backdrop-filter: blur(18px);
    }

    .auth-title {
        font-family: 'Lora', serif;
        font-size: 1.7rem;
        color: #c9a84c;
        text-align: center;
        margin-bottom: 8px;
    }

    .auth-sub {
        text-align: center;
        color: rgba(232, 228, 240, 0.60);
        font-size: 0.85rem;
        margin-bottom: 32px;
        line-height: 1.6;
    }

    .auth-form-group {
        margin-bottom: 20px;
    }

    .auth-form-group label {
        display: block;
        color: rgba(232, 228, 240, 0.65);
        font-size: 0.75rem;
        margin-bottom: 7px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .auth-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(201, 168, 76, 0.22);
        border-radius: 10px;
        padding: 12px 16px;
        color: #f0ead6;
        font-size: 0.9rem;
        transition: border-color 0.3s;
    }

    .auth-input:focus {
        outline: none;
        border-color: rgba(201, 168, 76, 0.55);
        background: rgba(255, 255, 255, 0.07);
    }

    .auth-btn {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, #c9a84c, #b8942a);
        border: none;
        border-radius: 10px;
        color: #0d0d1a;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        margin-top: 8px;
        transition: opacity 0.2s;
    }

    .auth-btn:hover {
        opacity: 0.88;
    }

    .auth-links {
        text-align: center;
        margin-top: 20px;
        font-size: 0.82rem;
    }

    .auth-links a {
        color: rgba(201, 168, 76, 0.8);
        text-decoration: none;
    }

    .auth-links a:hover {
        color: #c9a84c;
    }
</style>

<div class="auth-wrap">
    <div class="auth-card">
        <h2 class="auth-title">Reset Password</h2>
        <p class="auth-sub">Enter your email address and we'll send you a link to reset your password.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="auth-form-group">
                <label for="id_email">Email Address</label>
                <input type="email" name="email" id="id_email" class="auth-input" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="auth-btn">Send Reset Link</button>
        </form>

        <div class="auth-links">
            <a href="{% url 'accounts:login' %}">← Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
