{% extends "base.html" %}
{% block content %}
<style>
    .auth-wrap {
        max-width: 480px;
        margin: 60px auto;
        padding: 0 20px;
    }

    .auth-card {
        background: rgba(8, 8, 20, 0.75);
        border: 1px solid rgba(124, 106, 247, 0.25);
        border-radius: 20px;
        padding: 44px 40px;
        backdrop-filter: blur(18px);
        text-align: center;
    }

    .auth-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        background: rgba(124, 106, 247, 0.12);
        border: 1px solid rgba(124, 106, 247, 0.35);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
    }

    .auth-title {
        font-family: 'Lora', serif;
        font-size: 1.6rem;
        color: #7c6af7;
        margin-bottom: 12px;
    }

    .auth-sub {
        color: rgba(232, 228, 240, 0.62);
        font-size: 0.88rem;
        line-height: 1.7;
        margin-bottom: 28px;
    }

    .auth-btn {
        display: inline-block;
        padding: 12px 32px;
        background: linear-gradient(135deg, #c9a84c, #b8942a);
        border-radius: 10px;
        color: #0d0d1a;
        font-size: 0.9rem;
        font-weight: 700;
        text-decoration: none;
        transition: opacity 0.2s;
    }

    .auth-btn:hover {
        opacity: 0.88;
        color: #0d0d1a;
        text-decoration: none;
    }
</style>

<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-icon">✓</div>
        <h2 class="auth-title">Password Reset!</h2>
        <p class="auth-sub">
            Your password has been successfully reset.<br>
            You can now log in with your new password.
        </p>
        <a href="{% url 'accounts:login' %}" class="auth-btn">Log In Now</a>
    </div>
</div>
{% endblock %}
