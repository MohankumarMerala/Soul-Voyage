{% extends "base.html" %}
{% block content %}
<style>
    .auth-wrap {
        max-width: 480px;
        margin: 60px auto;
        padding: 0 20px;
    }

    .auth-card {
        background: rgba(8, 8, 20, 0.75);
        border: 1px solid rgba(78, 205, 196, 0.25);
        border-radius: 20px;
        padding: 44px 40px;
        backdrop-filter: blur(18px);
        text-align: center;
    }

    .auth-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        background: rgba(78, 205, 196, 0.12);
        border: 1px solid rgba(78, 205, 196, 0.35);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
    }

    .auth-title {
        font-family: 'Lora', serif;
        font-size: 1.6rem;
        color: #4ecdc4;
        margin-bottom: 12px;
    }

    .auth-sub {
        color: rgba(232, 228, 240, 0.62);
        font-size: 0.88rem;
        line-height: 1.7;
        margin-bottom: 28px;
    }

    .auth-btn {
        display: inline-block;
        padding: 11px 28px;
        background: linear-gradient(135deg, #c9a84c, #b8942a);
        border-radius: 10px;
        color: #0d0d1a;
        font-size: 0.88rem;
        font-weight: 700;
        text-decoration: none;
        transition: opacity 0.2s;
    }

    .auth-btn:hover {
        opacity: 0.88;
        color: #0d0d1a;
        text-decoration: none;
    }
</style>

<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-icon">📧</div>
        <h2 class="auth-title">Check Your Email</h2>
        <p class="auth-sub">
            We've sent a password reset link to your email address.<br>
            Click the link in the email to reset your password.<br><br>
            <small style="color:rgba(232,228,240,0.40);">
                Didn't receive it? Check your spam folder or try again.
            </small>
        </p>
        <a href="{% url 'accounts:password_reset' %}" class="auth-btn">Try Again</a>
    </div>
</div>
{% endblock %}
