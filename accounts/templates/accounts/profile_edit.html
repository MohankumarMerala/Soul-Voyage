{% extends "base.html" %}

{% block content %}

<div class="container" style="margin-top:60px; max-width:700px;">

    <div class="sv-panel"
        style="padding:30px;border-radius:12px;background:#1a1a35;box-shadow:0 10px 30px rgba(0,0,0,0.4);">

        <h2 style="margin-bottom:25px;color:#f9c74f;font-family:'Lora',serif;">
            Edit Your Profile
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                {{ form.name.label_tag }}
                {{ form.name }}
            </div>

            <div class="form-group">
                {{ form.email.label_tag }}
                {{ form.email }}
            </div>

            <div class="form-group">
                {{ form.age.label_tag }}
                {{ form.age }}
            </div>

            <div class="form-group">
                {{ form.dob.label_tag }}
                {{ form.dob }}
            </div>

            <div style="margin-top:25px">

                <button type="submit" class="btn-sv">
                    Save Changes
                </button>

                <a href="{% url 'accounts:profile' username=user.username %}" class="btn btn-default"
                    style="margin-left:10px;">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
