name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Soul Voyage
        run: |
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" https://soul-voyage.onrender.com)
          echo "Pinged at $(date) - Status: $STATUS"
          if [ $STATUS -eq 200 ]; then
            echo "Site is UP"
          else
            echo "Site returned $STATUS - may still be waking up"
          fi
